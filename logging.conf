# This section configures logging behavior.

[Logging]
    version = 1
    disable_existing_loggers = False

    [[root]]
      level = {log_level}
      handlers = console,

    [[loggers]]

    [[handlers]]

        # Log to console
        [[[console]]]
            level = DEBUG
            formatter = standard
            class = logging.StreamHandler
            stream = ext://sys.stdout
